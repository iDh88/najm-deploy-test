# Production rollback — manual, gated.
#
# F33 (audit P2-5): documented, executable rollback per component.
#
#   python-services   → Cloud Run native rollback: shift 100% traffic to a
#                       previous READY revision. Fast (seconds), no rebuild.
#   cloud-functions   → redeploy from a known-good git ref (Functions has no
#                       revision pinning) — supply `git_ref` (tag or SHA).
#   firestore-rules / storage-rules → redeploy from `git_ref`.
#
# Same one-time setup as deploy.yml (production environment + WIF vars).

name: Rollback (production)

on:
  workflow_dispatch:
    inputs:
      component:
        description: "What to roll back"
        required: true
        type: choice
        options:
          - python-services
          - cloud-functions
          - firestore-rules
          - storage-rules
      revision:
        description: "Cloud Run revision name (python-services only; see 'gcloud run revisions list')"
        required: false
      git_ref:
        description: "Known-good tag or SHA (functions / rules)"
        required: false
      confirm:
        description: 'Type "rollback" to confirm'
        required: true

concurrency:
  group: production-deploy    # never concurrent with a deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require confirmation string
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "rollback" ]; then
            echo "::error::Confirmation input must be exactly 'rollback'."
            exit 1
          fi

  python-services:
    if: github.event.inputs.component == 'python-services'
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Validate input
        run: |
          if [ -z "${{ github.event.inputs.revision }}" ]; then
            echo "::error::'revision' is required for python-services rollback."
            echo "List candidates with:"
            echo "  gcloud run revisions list --service cip-python-services --region ${{ vars.GCP_REGION }}"
            exit 1
          fi
      - name: Shift 100% traffic to previous revision
        run: |
          gcloud run services update-traffic cip-python-services \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --to-revisions "${{ github.event.inputs.revision }}=100"
      - name: Verify
        run: |
          gcloud run services describe cip-python-services \
            --project "${{ vars.GCP_PROJECT_ID }}" --region "${{ vars.GCP_REGION }}" \
            --format='value(status.traffic)'

  cloud-functions:
    if: github.event.inputs.component == 'cloud-functions'
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate input
        run: |
          if [ -z "${{ github.event.inputs.git_ref }}" ]; then
            echo "::error::'git_ref' (known-good tag/SHA) is required."
            exit 1
          fi
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.git_ref }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - name: Install deps + typecheck at the rollback ref
        working-directory: firebase/functions
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npx tsc --noEmit
      - name: Redeploy functions at rollback ref
        working-directory: firebase/functions
        run: npx firebase-tools deploy --only functions --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive

  firestore-rules:
    if: github.event.inputs.component == 'firestore-rules'
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate input
        run: |
          test -n "${{ github.event.inputs.git_ref }}" || { echo "::error::'git_ref' required"; exit 1; }
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.git_ref }}" }
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - name: Redeploy rules + indexes at rollback ref
        working-directory: firebase
        run: |
          npx firebase-tools deploy --only firestore:rules,firestore:indexes \
            --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive

  storage-rules:
    if: github.event.inputs.component == 'storage-rules'
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate input
        run: |
          test -n "${{ github.event.inputs.git_ref }}" || { echo "::error::'git_ref' required"; exit 1; }
      - uses: actions/checkout@v4
        with: { ref: "${{ github.event.inputs.git_ref }}" }
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - name: Redeploy storage rules at rollback ref
        working-directory: firebase
        run: |
          npx firebase-tools deploy --only storage \
            --project "${{ vars.GCP_PROJECT_ID }}" --non-interactive
