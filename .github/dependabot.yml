# Dependabot — weekly dependency PRs per ecosystem (F34).
# Grouped minor/patch to keep PR volume sane; majors arrive individually.
version: 2
updates:
  - package-ecosystem: pip
    directory: /python_services
    schedule: { interval: weekly }
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /firebase/functions
    schedule: { interval: weekly }
    groups:
      functions-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: pub
    directory: /flutter_app
    schedule: { interval: weekly }
    groups:
      flutter-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
