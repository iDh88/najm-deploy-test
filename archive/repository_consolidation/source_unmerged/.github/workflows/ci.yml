name: CI

# Gate every push and PR to main on all three stacks + Firestore rules.
# Make these jobs "required status checks" in branch protection so a red build
# blocks merge and deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-services:
    name: Python services (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python_services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint (ruff — BLOCKING)
        # F32: was advisory (`|| true`), which let real defects merge. Rule
        # scope lives in python_services/ruff.toml (fatal E9/F63/F7/F82 set);
        # the tree was pre-verified clean against it.
        run: ruff check .
      - name: Unit + integration tests
        run: pytest -q

  cloud-functions:
    name: Cloud Functions (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # P1-4: `npm ci` requires a committed package-lock.json. Until one is
      # generated (run `npm install` locally in firebase/functions and commit
      # the lockfile), fall back to `npm install` so the job can run. Once the
      # lockfile is committed, add `cache: npm` +
      # `cache-dependency-path: firebase/functions/package-lock.json` above and
      # switch this back to `npm ci` for reproducible installs.
      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Unit tests (mapping contracts — F36)
        run: npm test
      - name: Lint (eslint)
        run: npm run lint --if-present

  flutter-app:
    name: Flutter (analyze + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # B1: models.dart depends on freezed/json_serializable generated parts
      # (models.freezed.dart, models.g.dart) that are NOT committed. Generate
      # them before analyze/test, otherwise both fail on the missing `part`
      # files. (If you choose to commit the generated files instead, this step
      # is still safe — it will just regenerate them.)
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Static analysis
        run: flutter analyze
      - name: Tests
        run: flutter test

  firestore-rules:
    name: Firebase rules (emulator tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Run Firestore + Storage rules tests (F36)
        run: |
          firebase emulators:exec --only firestore,storage --project cip-najm-rules-test \
            "npm --prefix test install && npm --prefix test test"

  client-secret-isolation:
    name: Client secret isolation (ADR-004)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert clients reference no server secrets
        # The Flutter and Admin clients must never contain server-side secret
        # names or the service-auth header (ADR-004 / docs/SECRETS.md). This is
        # a cheap invariant that complements gitleaks in security.yml.
        run: |
          patterns='INTERNAL_SERVICE_TOKEN|ANTHROPIC_API_KEY|OPENAI_API_KEY|ADMIN_SETUP_TOKEN|X-Service-Token'
          if grep -rnE "$patterns" flutter_app/lib admin_panel 2>/dev/null; then
            echo "::error::A server secret name appears in client code — remove it (ADR-004, docs/SECRETS.md)."
            exit 1
          fi
          echo "✓ No server secrets referenced in client code."
