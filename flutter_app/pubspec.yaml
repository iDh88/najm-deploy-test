name: crew_intelligence_platform
description: Crew Intelligence Platform — Saudi Airlines Cabin Crew Scheduling Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.5
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9
  firebase_app_check: ^0.2.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.4.0
  retrofit: ^4.9.2
  # Used directly by trade_search_screen.dart; previously only a transitive
  # dependency (depend_on_referenced_packages violation).
  http: ^1.6.0
  flutter_secure_storage: ^9.2.2

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0
  lottie: ^3.5.1
  fl_chart: ^0.66.2

  # File Handling
  file_picker: ^6.1.1
  path_provider: ^2.1.6
  # Used directly by storage_service.dart; previously only transitive.
  path: ^1.9.1
  open_filex: ^4.3.4

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.0.2
  package_info_plus: ^9.0.1
  connectivity_plus: ^7.3.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  share_plus: ^7.2.2

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Speech
  speech_to_text: ^6.6.0

  # Payments

  # Phase 1 — Layover
  google_maps_flutter: ^2.17.1
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  image_picker: ^1.2.3
  timeago: ^3.6.0

  # Misc
  uuid: ^4.3.3
  collection: ^1.19.1
  rxdart: ^0.28.0
  flutter_keyboard_visibility: ^5.4.1
  haptic_feedback: ^0.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  faker: ^2.1.0

flutter:
  uses-material-design: true
  generate: true

  # assets/icons removed (P2/T1): declared but unused and absent on disk.
  # Inter fonts removed (P2/T1): the .ttf binaries were declared but never
  # shipped, which fails the build. The app falls back to the platform font
  # (Roboto/SF), which also covers Arabic glyphs better than Inter does.
  # To restore the Inter typeface: add assets/fonts/Inter-*.ttf and re-add the
  # fonts: block below.
  assets:
    - assets/images/
    - assets/legal/

