# Remediation B2: the project previously had no analysis_options.yaml, so
# `flutter analyze` ran with only bare analyzer defaults (not even flutter_lints).
# This restores a standard, meaningful static-analysis gate.
#
# NOTE: this requires `flutter_lints` in dev_dependencies. Add if missing:
#   flutter pub add --dev flutter_lints
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Latent async-context misuse flagged in the audit (B3) — surface it loudly.
    use_build_context_synchronously: warning
    # Silently-dropped Futures are a real failure surface (B4).
    unawaited_futures: warning
    discarded_futures: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    prefer_const_constructors: true
    prefer_final_locals: true
    avoid_print: true
    require_trailing_commas: true
